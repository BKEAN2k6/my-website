<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Strength Meter 🍬</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Gill Sans', 'Gill Sans MT', 'Trebuchet MS', sans-serif; }
@keyframes float {
0%, 100% { transform: translateY(0px) rotate(0deg); }
50% { transform: translateY(-14px) rotate(3deg); }
}
@keyframes bounce {
0%, 100% { transform: translateY(0px); }
50% { transform: translateY(-10px); }
}
@keyframes wiggle {
0%, 100% { transform: rotate(-5deg); }
50% { transform: rotate(5deg); }
}
@keyframes particle-burst {
0% { transform: translate(0, 0) scale(1.2); opacity: 1; }
100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
}
@keyframes confetti-fall {
0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}
@keyframes slide-in {
from { opacity: 0; transform: translateX(20px); }
to { opacity: 1; transform: translateX(0); }
}
@keyframes bar-grow {
from { transform: scaleX(0); }
to { transform: scaleX(1); }
}
@keyframes pulse-btn {
0%, 100% { transform: scale(1) rotate(0deg); box-shadow: 4px 4px 0px #2D1A55, 0 0 16px #F5C84244; }
50% { transform: scale(1.07) rotate(-1deg); box-shadow: 4px 4px 0px #2D1A55, 0 0 40px #F5C84299; }
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const KUVA_KANSIO = ""; 

function nameToFileName(name) {
return name
.toLowerCase()
.replace(/\s+/g, "-")
.replace(/[^a-z0-9\-]/g, "");
}

function useAutoImage(strengthName) {
const base = KUVA_KANSIO + nameToFileName(strengthName);
const formats = [".png", ".jpg", ".jpeg", ".webp", ".svg"];
const [foundSrc, setFoundSrc] = useState(null);

useEffect(() => {
let cancelled = false;
async function tryFormats() {
for (const ext of formats) {
const src = base + ext;
const ok = await new Promise(resolve => {
const img = new Image();
img.onload = () => resolve(true);
img.onerror = () => resolve(false);
img.src = src;
});
if (ok && !cancelled) { setFoundSrc(src); return; }
}
}
tryFormats();
return () => { cancelled = true; };
}, [base]);

return foundSrc;
}

const CANDY = {
bg: "#6B3FA0", bgDark: "#4A2A78",
yellow: "#F5C842", coral: "#F0614A", pink: "#F2A0B8",
mint: "#7ECFB3", teal: "#4BBFAD", orange: "#F5843A",
lilac: "#C9A8E8", blue: "#5BAFD6", red: "#E8404A",
white: "#FFF8F0", darkPurple: "#2D1A55",
};

const STRENGTHS = [
{ strength: "Creativity", icon: "🍬", color: CANDY.coral, statements: [
{ text: "I often hear from others that I come up with original ideas.", reversed: false },
{ text: "I always want to do things in the same, familiar way.", reversed: true }]},
{ strength: "Curiosity", icon: "🐛", color: CANDY.yellow, statements: [

{ text: "I constantly want to learn new things and am broadly interested in subjects, people, and phenomena.", reversed: false }]},
{ strength: "Judgment", icon: "🐟", color: CANDY.mint, statements: [
{ text: "I can think rationally in different situations and consider various options.", reversed: false },
{ text: "I only make decisions once I know everything about the matter.", reversed: true }]},
{ strength: "Love of Learning", icon: "🍭", color: CANDY.pink, statements: [
{ text: "I am interested in many things and want to constantly learn new skills.", reversed: false },
{ text: "I enjoy visiting libraries, reading a lot, and following various news channels.", reversed: false }]},
{ strength: "Perspective", icon: "🐻", color: CANDY.orange, statements: [

{ strength: "Honesty", icon: "🍋", color: CANDY.teal, statements: [

{ strength: "Zest", icon: "⭐", color: CANDY.coral, statements: [

{ text: "I am passive and don't get excited easily about new things or people.", reversed: true }]},
{ strength: "Sisu (Grit)", icon: "🥊", color: CANDY.orange, statements: [

{ strength: "Compassion", icon: "🫶", color: CANDY.pink, statements: [

{ strength: "Love", icon: "🩷", color: CANDY.red, statements: [

{ text: "It is difficult for me to accept closeness and love shown by others.", reversed: true }]},
{ strength: "Kindness", icon: "🐷", color: CANDY.mint, statements: [
{ text: "I am happy to be of help or service to others.", reversed: false },
{ text: "I feel that 'others' happiness is a loss for me,' and I can't rejoice in others' successes.", reversed: true }]},
{ strength: "Social Intelligence", icon: "🫧", color: CANDY.blue, statements: [
{ text: "I do well in various social situations and with new people.", reversed: false },
{ text: "It is difficult for me to recognize the emotional states of others.", reversed: true }]},
{ strength: "Teamwork", icon: "🍡", color: CANDY.teal, statements: [
{ text: "My best qualities come out in a group, and the success of the group motivates me.", reversed: false },
{ text: "I don't enjoy taking responsibility as a group member and prefer to stay passive.", reversed: true }]},
{ strength: "Fairness", icon: "⚖️", color: CANDY.yellow, statements: [
{ text: "It is important to me to treat everyone equally.", reversed: false },
{ text: "My prejudices and feelings affect how I treat other people.", reversed: true }]},
{ strength: "Leadership", icon: "🍊", color: CANDY.coral, statements: [
{ text: "I could be described as a strong and fair leader.", reversed: false },
{ text: "I don't easily get others excited about doing things together.", reversed: true }]},
{ strength: "Forgiveness", icon: "🌸", color: CANDY.pink, statements: [
{ text: "I don't dwell on the past; it's easy for me to let go and move on in life.", reversed: false },
{ text: "I clearly remember past wrongs I have experienced.", reversed: true }]},
{ strength: "Humility", icon: "🫐", color: CANDY.lilac, statements: [
{ text: "I don't draw attention to myself in any situation and prefer to stay in the background.", reversed: false },
{ text: "My friends would describe me as modest.", reversed: false }]},
{ strength: "Prudence", icon: "🔵", color: CANDY.blue, statements: [
{ text: "I always make well-considered decisions.", reversed: false },
{ text: "I am spontaneous and live in the moment.", reversed: true }]},
{ strength: "Self-Regulation", icon: "🍦", color: CANDY.mint, statements: [
{ text: "I can regulate my emotions and behavior to suit different situations.", reversed: false },
{ text: "It's hard for me to resist unnecessary distractions (e.g., constantly checking my phone).", reversed: true }]},
{ strength: "Appreciation of Beauty", icon: "🌈", color: CANDY.coral, statements: [
{ text: "I notice beautiful details and often stop to appreciate them.", reversed: false },
{ text: "I rarely stop to admire art or the beauty of the environment.", reversed: true }]},
{ strength: "Gratitude", icon: "✨", color: CANDY.yellow, statements: [
{ text: "I don't really experience gratitude for the small things in life.", reversed: true },
{ text: "My family would say that I say thank you often and am sincerely grateful.", reversed: false }]},
{ strength: "Hope", icon: "🚀", color: CANDY.teal, statements: [
{ text: "It's easy for me to see the good side of things and I see the future as positive.", reversed: false },
{ text: "I find it hard to see a way out of setbacks.", reversed: true }]},
{ strength: "Humor", icon: "😄", color: CANDY.red, statements: [
{ text: "I find humor and small glimmers of joy even in difficult life situations.", reversed: false },
{ text: "I enjoy telling jokes and making others laugh and be happy.", reversed: false }]},
{ strength: "Spirituality", icon: "🔮", color: CANDY.lilac, statements: [
{ text: "I believe that life has a deeper meaning or purpose.", reversed: false },
{ text: "I almost never think about things related to the greater meanings of life.", reversed: true }]},
];

const QUESTIONS = STRENGTHS.flatMap((s) =>
s.statements.map((st) => ({
strength: s.strength, icon: s.icon, color: s.color,
question: st.text, reversed: st.reversed,
}))
);

const ANSWER_OPTIONS = [
{ label: "Fits me very well", score: 5 },
{ label: "Fits me well", score: 4 },
{ label: "Neutral", score: 3 },
{ label: "Fits me poorly", score: 2 },
{ label: "Does not fit me at all", score: 1 },
];

const FONT = "'Gill Sans', 'Gill Sans MT', 'Trebuchet MS', sans-serif";

function StrengthIcon({ name, emoji, size = 44, style = {} }) {
const src = useAutoImage(name);
if (src) {
return <img src={src} alt={name} style={{ width: size, height: size, objectFit: "contain", ...style }} />;
}
return <span style={{ fontSize: size * 0.9, lineHeight: 1, display: "inline-block", ...style }}>{emoji}</span>;
}

function useBgImage(key) {
const base = KUVA_KANSIO + key + "-bg";
const [src, setSrc] = useState(null);
useEffect(() => {
let cancelled = false;
async function tryFormats() {
for (const ext of [".png",".jpg",".jpeg",".webp"]) {
const ok = await new Promise(resolve => {
const img = new Image();
img.onload = () => resolve(true);
img.onerror = () => resolve(false);
img.src = base + ext;
});
if (ok && !cancelled) { setSrc(base + ext); return; }
}
}
tryFormats();
return () => { cancelled = true; };
}, [base]);
return src;
}

function useLogo() {
const [src, setSrc] = useState(null);
useEffect(() => {
let cancelled = false;
async function tryFormats() {
for (const ext of [".png",".jpg",".svg",".webp"]) {
const ok = await new Promise(resolve => {
const img = new Image();
img.onload = () => resolve(true);
img.onerror = () => resolve(false);
img.src = KUVA_KANSIO + "logo" + ext;
});
if (ok && !cancelled) { setSrc(KUVA_KANSIO + "logo" + ext); return; }
}
}
tryFormats();
return () => { cancelled = true; };
}, []);
return src;
}

function Particle({ x, y, color, onDone }) {
useEffect(() => { const t = setTimeout(onDone, 800); return () => clearTimeout(t); }, [onDone]);
const dx = (Math.random() - 0.5) * 140;
const dy = -(Math.random() * 120 + 50);
return (
<div style={{
position: "fixed", left: x, top: y, width: 10, height: 10,
borderRadius: Math.random() > 0.5 ? "50%" : "2px",
backgroundColor: color, pointerEvents: "none", zIndex: 9999,
animation: "particle-burst 0.8s ease-out forwards",
"--dx": dx + "px", "--dy": dy + "px",
}} />
);
}

function Confetti() {
const colors = [CANDY.yellow, CANDY.coral, CANDY.pink, CANDY.mint, CANDY.orange, CANDY.blue, CANDY.lilac, CANDY.red, CANDY.white];
const pieces = Array.from({ length: 100 }, (_, i) => ({
left: `${Math.random() * 100}%`, top: "-20px",
width: 7 + Math.random() * 9,
height: Math.random() > 0.5 ? 7 + Math.random() * 9 : 3 + Math.random() * 4,
backgroundColor: colors[i % colors.length],
borderRadius: Math.random() > 0.6 ? "50%" : "2px",
transform: `rotate(${Math.random() * 360}deg)`,
animation: `confetti-fall ${2 + Math.random() * 2.5}s ${Math.random() * 2}s ease-in forwards`,
position: "fixed", zIndex: 9998, pointerEvents: "none",
}));
return <div>{pieces.map((s, i) => <div key={i} style={s} />)}</div>;
}

function ProgressBar({ current, total }) {
const pct = (current / total) * 100;
return (
<div style={{ width: "100%", maxWidth: 500, margin: "0 auto 28px" }}>
<div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
<span style={{ fontSize: 13, color: CANDY.lilac, fontFamily: FONT, fontWeight: 600 }}>
Statement {current} / {total}
</span>
<span style={{ fontSize: 13, color: CANDY.lilac, fontFamily: FONT, fontWeight: 600 }}>
{Math.round(pct)}%
</span>
</div>
<div style={{ height: 10, background: "rgba(0,0,0,0.25)", borderRadius: 10, overflow: "hidden", border: "2px solid rgba(255,255,255,0.15)" }}>
<div style={{
height: "100%", width: `${pct}%`,
background: `linear-gradient(90deg, ${CANDY.pink}, ${CANDY.yellow})`,
borderRadius: 10, transition: "width 0.5s cubic-bezier(0.4,0,0.2,1)",
boxShadow: `0 0 12px ${CANDY.yellow}88`,
}} />
</div>
</div>
);
}

function FloatingIcon({ strength, emoji, index }) {
const src = useAutoImage(strength);
const size = 32 + (index % 3) * 12;
const style = {
position: "absolute",
opacity: 0.2,
top: `${10 + (index * 11) % 80}%`,
left: `${5 + (index * 13) % 90}%`,
animation: `float ${3 + index * 0.4}s ease-in-out infinite`,
animationDelay: `${index * 0.5}s`,
pointerEvents: "none", userSelect: "none",
};
if (src) {
return <img src={src} alt="" style={{ ...style, width: size, height: size, objectFit: "contain" }} />;
}
return <div style={{ ...style, fontSize: size }}>{emoji}</div>;
}

function WelcomeScreen({ onStart }) {
const bgSrc = useBgImage("welcome");
const logoSrc = useLogo();
const bgStyle = bgSrc
? { backgroundImage: `url(${bgSrc})`, backgroundSize: "cover", backgroundPosition: "center" }
: { background: `radial-gradient(ellipse at 30% 20%, #7B4DB8 0%, ${CANDY.bg} 40%, ${CANDY.bgDark} 100%)` };

const floaters = [0, 3, 6, 9, 12, 15, 18, 22].map(i => STRENGTHS[i]);

return (
<div style={{
display: "flex", flexDirection: "column", alignItems: "center",
justifyContent: "center", minHeight: "100vh", padding: "40px 24px",
textAlign: "center", position: "relative", overflow: "hidden", ...bgStyle,
}}>
{floaters.map((s, i) => (
<FloatingIcon key={s.strength} strength={s.strength} emoji={s.icon} index={i} />
))}

{logoSrc && (
<img src={logoSrc} alt="logo"
style={{ width: 120, marginBottom: 24, position: "relative", zIndex: 1 }} />
)}

<div style={{ marginBottom: 16, animation: "bounce 1.2s ease-in-out infinite" }}>
<StrengthIcon name={STRENGTHS[0].strength} emoji={STRENGTHS[0].icon} size={80} />
</div>

<h1 style={{ fontFamily: FONT, fontSize: "clamp(28px,6vw,50px)", fontWeight: 700, color: CANDY.white, lineHeight: 1.2, marginBottom: 6, textShadow: `3px 3px 0px ${CANDY.darkPurple}` }}>
Welcome to measure
</h1>
<h1 style={{ fontFamily: FONT, fontSize: "clamp(28px,6vw,50px)", fontWeight: 700, color: CANDY.yellow, lineHeight: 1.2, marginBottom: 20, textShadow: `3px 3px 0px ${CANDY.darkPurple}` }}>
your strengths!
</h1>
<p style={{ fontFamily: FONT, fontSize: "clamp(15px,2.2vw,18px)", color: CANDY.lilac, maxWidth: 380, lineHeight: 1.65, marginBottom: 52 }}>
These 52 statements reveal your unique core strengths.
Answer honestly — there are no right or wrong answers.
</p>

<button onClick={onStart} style={{
padding: "18px 58px", fontSize: 20, fontFamily: FONT, fontWeight: 700,
letterSpacing: "0.06em", textTransform: "uppercase",
color: CANDY.darkPurple, background: CANDY.yellow,
border: `3px solid ${CANDY.darkPurple}`, borderRadius: 60, cursor: "pointer",
animation: "pulse-btn 1.8s ease-in-out
